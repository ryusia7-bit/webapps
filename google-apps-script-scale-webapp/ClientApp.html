<script>
(() => {
  "use strict";

  const WORKER_NAME_KEY = "mindmap_apps_script_worker_name_v1";
  const SESSION_TOKEN_KEY = "mindmap_apps_script_session_token_v1";
  const SESSION_USERNAME_KEY = "mindmap_apps_script_session_username_v1";
  const state = {
    manifest: [],
    questionnaires: new Map(),
    currentId: null,
    currentQuestionnaire: null,
    lastResult: null,
    recentRecords: [],
    adminData: null,
    authenticated: false,
    sessionToken: "",
    currentUser: null,
    status: window.__BOOTSTRAP__?.status || null,
    settings: window.__BOOTSTRAP__?.settings || { organizationName: "", teamName: "", contactNote: "" },
    publicBootstrap: window.__BOOTSTRAP__ || {}
  };

  const ui = {};
  document.addEventListener("DOMContentLoaded", init);

  function init() {
    cacheUi();
    bindEvents();
    hydrateBundle();
    applyBootstrap();
    if (localStorage.getItem(SESSION_TOKEN_KEY)) {
      restoreSession();
    } else {
      showAuthView(state.publicBootstrap.loginHint || "아이디와 비밀번호를 입력해주세요.", "");
    }
  }

  function cacheUi() {
    [
      "authRoot", "appRoot", "authAppName", "authAppSubtitle", "loginCard", "openSignupBtn",
      "loginForm", "loginUsername", "loginPassword",
      "loginMessage", "loginBtn",
      "logoutBtn", "appName", "appSubtitle", "currentUserText", "spreadsheetText",
      "sheetStatsText", "appStatusMessage", "refreshAppBtn", "questionnaireNav", "questionnaireCount",
      "scaleTitle", "scaleMeta", "resetFormBtn", "printResultBtn", "saveResultBtn", "screeningForm",
      "sessionDate", "workerName", "clientLabel", "birthDate", "sessionNote", "respondentFields",
      "questionPrompt", "questionsRoot", "progressLabel", "progressFill", "resultStateChip", "resultEmpty",
      "resultPanel", "printOrgLine", "printScaleLine", "printMetaLine", "resultTitle", "resultScore",
      "resultBand", "resultFlags", "resultHighlights", "resultMeta", "resultBreakdown", "resultNotes",
      "recordsTableBody", "recordsEmpty", "refreshRecordsBtn", "questionTemplate", "radioFieldTemplate",
      "adminPanel", "adminSummaryChip", "refreshAdminBtn", "adminFormTitle", "clearAdminFormBtn", "adminAccountForm",
      "adminOriginalUsername", "adminSourceRequestId", "adminUsername", "adminDisplayName", "adminPassword", "adminRole", "adminActive",
      "adminContact", "adminAffiliation", "adminNotes", "adminAccountSaveBtn", "adminAccountCancelBtn",
      "adminAccountMessage", "adminAccountsTableBody", "adminAccountsEmpty", "adminAccountCountChip",
      "adminRequestsTableBody", "adminRequestsEmpty", "adminRequestCountChip"
    ].forEach((id) => { ui[id] = document.getElementById(id); });
  }

  function bindEvents() {
    ui.refreshAppBtn.addEventListener("click", onRefreshApp);
    ui.refreshRecordsBtn.addEventListener("click", onRefreshRecords);
    ui.resetFormBtn.addEventListener("click", onResetForm);
    ui.printResultBtn.addEventListener("click", () => state.lastResult ? window.print() : alert("먼저 결과를 계산해주세요."));
    ui.saveResultBtn.addEventListener("click", onSaveResult);
    ui.logoutBtn.addEventListener("click", onLogout);
    ui.loginForm.addEventListener("submit", onLoginSubmit);
    ui.openSignupBtn.addEventListener("click", goToSignupPage);
    ui.adminAccountForm.addEventListener("submit", onAdminAccountSubmit);
    ui.adminAccountCancelBtn.addEventListener("click", onAdminAccountReset);
    ui.clearAdminFormBtn.addEventListener("click", onAdminAccountReset);
    ui.refreshAdminBtn.addEventListener("click", onRefreshApp);
    ui.adminAccountsTableBody.addEventListener("click", onAdminAccountsActionClick);
    ui.adminRequestsTableBody.addEventListener("click", onAdminRequestsActionClick);
    ui.screeningForm.addEventListener("submit", onSubmit);
    ui.screeningForm.addEventListener("change", onFormChange);
    ui.workerName.addEventListener("input", () => {
      const value = ui.workerName.value.trim();
      if (value) localStorage.setItem(WORKER_NAME_KEY, value);
      else localStorage.removeItem(WORKER_NAME_KEY);
    });
    ui.loginUsername.addEventListener("input", () => {
      const value = ui.loginUsername.value.trim();
      if (value) localStorage.setItem(SESSION_USERNAME_KEY, value);
      else localStorage.removeItem(SESSION_USERNAME_KEY);
    });
  }

  function hydrateBundle() {
    const bundle = window.__SCALE_SCREENING_BUNDLE__ || { manifest: [], questionnaires: {} };
    state.manifest = Array.isArray(bundle.manifest) ? clone(bundle.manifest) : [];
    state.questionnaires = new Map(Object.entries(bundle.questionnaires || {}).map(([id, q]) => [id, clone(q)]));
  }

  function applyBootstrap() {
    const bootstrap = window.__BOOTSTRAP__ || {};
    const appName = bootstrap.appName || "MindMap 다시서기";
    const appSubtitle = bootstrap.subtitle || "노숙인 정신건강 척도 관리 웹앱";
    ui.appName.textContent = appName;
    ui.appSubtitle.textContent = appSubtitle;
    ui.authAppName.textContent = appName;
    ui.authAppSubtitle.textContent = appSubtitle;
    ui.questionnaireCount.textContent = `총 ${state.manifest.length}개 척도`;
    ui.loginMessage.textContent = bootstrap.loginHint || "아이디와 비밀번호를 입력해주세요.";
    ui.loginUsername.value = localStorage.getItem(SESSION_USERNAME_KEY) || "";
    document.title = appName;
    if (bootstrap.signupEnabled === false) {
      ui.openSignupBtn.disabled = true;
      ui.openSignupBtn.classList.add("disabled");
      ui.openSignupBtn.title = bootstrap.signupHint || "현재는 가입신청을 사용할 수 없습니다.";
    } else {
      ui.openSignupBtn.disabled = false;
      ui.openSignupBtn.classList.remove("disabled");
      ui.openSignupBtn.title = "";
    }
  }

  function applyStatusPayload(payload) {
    state.status = clone(payload || {});
    state.recentRecords = Array.isArray(payload?.recentRecords) ? clone(payload.recentRecords) : [];
    state.adminData = payload?.adminData ? clone(payload.adminData) : null;
    state.authenticated = payload?.authenticated !== false;
    state.currentUser = payload?.currentUser ? clone(payload.currentUser) : null;
    ui.currentUserText.textContent = payload?.currentUser?.displayName || payload?.currentUser?.username || "조직 계정";
    ui.spreadsheetText.textContent = payload?.targetSpreadsheetName || payload?.targetSpreadsheetId || "연결 대기";
    ui.sheetStatsText.textContent = payload?.sheets
      ? `기록 ${payload.sheets.records || 0}건 / 응답 ${payload.sheets.answers || 0}건 / 척도 ${payload.sheets.questionnaires || 0}건`
      : "확인 대기";
    renderRecentRecords();
    renderAdminPanel();
  }

  function handlePrepared(data) {
    applyStatusPayload(data);
    setStatusMessage("구글 시트 연결과 척도 마스터 동기화를 확인했습니다.", "success");
  }

  function restoreSession() {
    const token = localStorage.getItem(SESSION_TOKEN_KEY);
    if (!token) {
      showAuthView(state.publicBootstrap.loginHint || "아이디와 비밀번호를 입력해주세요.", "");
      return;
    }

    setLoginMessage("기존 로그인 상태를 확인하는 중입니다.", "");
    google.script.run.withSuccessHandler((response) => {
      if (response?.authenticated) {
        enterAuthenticatedSession(response);
        setStatusMessage("로그인 상태를 복원했습니다. 화면 정보를 불러오는 중입니다.", "");
        window.setTimeout(() => refreshAppStatus("앱 정보를 불러왔습니다."), 0);
        return;
      }

      clearSessionStorage();
      showAuthView(
        response?.loginHint || "세션이 만료되었습니다. 다시 로그인해주세요.",
        response?.sessionExpired ? "error" : ""
      );
    }).withFailureHandler((error) => {
      clearSessionStorage();
      showAuthView(error?.message || "로그인 상태를 확인할 수 없습니다.", "error");
    }).getScaleWebappBootstrap(token);
  }

  function onLoginSubmit(event) {
    event.preventDefault();
    const username = ui.loginUsername.value.trim();
    const password = ui.loginPassword.value;

    if (!username || !password) {
      setLoginMessage("아이디와 비밀번호를 모두 입력해주세요.", "error");
      return;
    }

    ui.loginBtn.disabled = true;
    setLoginMessage("로그인하는 중입니다.", "");
    google.script.run.withSuccessHandler((response) => {
      ui.loginBtn.disabled = false;
      if (!response?.authenticated) {
        setLoginMessage("로그인 정보를 확인해주세요.", "error");
        ui.loginPassword.select();
        ui.loginPassword.focus();
        return;
      }

      enterAuthenticatedSession(response);
      setStatusMessage("로그인했습니다. 화면 정보를 불러오는 중입니다.", "");
      window.setTimeout(() => refreshAppStatus("로그인했습니다."), 0);
    }).withFailureHandler((error) => {
      ui.loginBtn.disabled = false;
      setLoginMessage(error?.message || "로그인에 실패했습니다.", "error");
      ui.loginPassword.select();
      ui.loginPassword.focus();
    }).loginScaleWebapp(username, password);
  }

  function enterAuthenticatedSession(response) {
    state.authenticated = true;
    state.sessionToken = response?.sessionToken || "";
    state.currentUser = response?.currentUser ? clone(response.currentUser) : null;
    if (state.sessionToken) {
      localStorage.setItem(SESSION_TOKEN_KEY, state.sessionToken);
    }
    localStorage.setItem(SESSION_USERNAME_KEY, ui.loginUsername.value.trim());
    applyStatusPayload(response?.status || {
      authenticated: true,
      currentUser: response?.currentUser ? clone(response.currentUser) : null,
      recentRecords: state.recentRecords,
      adminData: state.adminData
    });
    showAppView();
    ui.logoutBtn.classList.remove("hidden");
    renderNav();
    if (state.manifest.length) {
      loadQuestionnaire(state.currentId && state.questionnaires.has(state.currentId) ? state.currentId : state.manifest[0].id);
    }
    renderRecentRecords();
  }

  function refreshAppStatus(successMessage) {
    setStatusMessage("앱 정보를 불러오는 중입니다.", "");
    google.script.run.withSuccessHandler((response) => {
      applyStatusPayload(response || {});
      setStatusMessage(successMessage || "앱 정보를 불러왔습니다.", "success");
    }).withFailureHandler(handleFailure).getScaleWebappStatus(state.sessionToken);
  }

  function showAuthView(message, type) {
    state.authenticated = false;
    ui.authRoot.classList.remove("hidden");
    ui.appRoot.classList.add("hidden");
    document.body.classList.remove("app-view");
    document.body.classList.add("auth-view");
    ui.logoutBtn.classList.add("hidden");
    ui.loginBtn.disabled = false;
    ui.loginPassword.value = "";
    showLoginView(message || state.publicBootstrap.loginHint || "아이디와 비밀번호를 입력해주세요.", type);
  }

  function showAppView() {
    ui.authRoot.classList.add("hidden");
    ui.appRoot.classList.remove("hidden");
    document.body.classList.remove("auth-view");
    document.body.classList.add("app-view");
  }

  function showLoginView(message, type) {
    ui.loginCard.classList.remove("hidden");
    setLoginMessage(message || state.publicBootstrap.loginHint || "아이디와 비밀번호를 입력해주세요.", type);
    window.setTimeout(() => ui.loginUsername.focus(), 0);
  }

  function goToSignupPage() {
    if (ui.openSignupBtn.disabled) {
      alert((window.__BOOTSTRAP__ || {}).signupHint || "현재는 가입신청을 사용할 수 없습니다.");
      return;
    }
    navigateTop(buildPageUrl("signup"));
  }

  function getNavigationBaseUrl() {
    const bootstrap = window.__BOOTSTRAP__ || {};
    const cachedBase = bootstrap.webAppUrl || bootstrap.loginUrl || "";
    const currentUrl = window.location.href || "";
    let topUrl = "";

    try {
      topUrl = window.top && window.top.location ? window.top.location.href || "" : "";
    } catch (error) {
      topUrl = "";
    }

    if (topUrl && topUrl.includes("/exec")) return topUrl;
    if (currentUrl && currentUrl.includes("/exec")) return currentUrl;
    return cachedBase || currentUrl;
  }

  function buildPageUrl(pageMode) {
    const baseUrl = getNavigationBaseUrl();
    const url = new URL(baseUrl);
    if (pageMode === "signup") {
      url.searchParams.set("page", "signup");
      url.searchParams.set("cb", Date.now().toString(36));
    } else if (pageMode === "app") {
      url.searchParams.set("page", "app");
      url.searchParams.set("cb", Date.now().toString(36));
    } else {
      url.searchParams.delete("page");
      url.searchParams.delete("view");
      url.searchParams.delete("cb");
    }
    url.searchParams.delete("format");
    url.searchParams.delete("sessionToken");
    url.searchParams.delete("token");
    return url.toString();
  }

  function navigateTop(url) {
    if (window.top && window.top !== window) {
      window.top.location.href = url;
      return;
    }
    window.location.href = url;
  }

  function clearSessionStorage() {
    localStorage.removeItem(SESSION_TOKEN_KEY);
    state.authenticated = false;
    state.sessionToken = "";
    state.currentUser = null;
  }

  function clearAppStateForLogout() {
    state.currentId = null;
    state.currentQuestionnaire = null;
    state.lastResult = null;
    state.recentRecords = [];
    state.status = null;
    ui.questionnaireNav.innerHTML = "";
    ui.questionsRoot.innerHTML = "";
    ui.respondentFields.innerHTML = "";
    ui.questionPrompt.textContent = "";
    ui.scaleTitle.textContent = "척도를 불러오는 중입니다.";
    ui.scaleMeta.textContent = "";
    ui.progressFill.style.width = "0%";
    ui.progressLabel.textContent = "0%";
    ui.currentUserText.textContent = "불러오는 중";
    ui.spreadsheetText.textContent = "불러오는 중";
    ui.sheetStatsText.textContent = "불러오는 중";
    ui.recordsTableBody.innerHTML = "";
    ui.recordsEmpty.classList.remove("hidden");
    clearAdminPanel();
    ui.loginBtn.disabled = false;
    clearResult();
  }

  function setLoginMessage(message, type) {
    ui.loginMessage.textContent = message;
    ui.loginMessage.className = `status-inline${type ? ` ${type}` : ""}`;
  }

  function handleFailure(error) {
    console.error(error);
    const message = error?.message || "Apps Script 호출에 실패했습니다.";
    if (message.includes("로그인") || message.includes("세션")) {
      clearSessionStorage();
      clearAppStateForLogout();
      showAuthView(message, "error");
      return;
    }
    setStatusMessage(message, "error");
    alert(message);
  }

  function setStatusMessage(message, type) {
    ui.appStatusMessage.textContent = message;
    ui.appStatusMessage.className = `status-inline${type ? ` ${type}` : ""}`;
  }

  function setAdminAccountMessage(message, type) {
    ui.adminAccountMessage.textContent = message;
    ui.adminAccountMessage.className = `status-inline${type ? ` ${type}` : ""}`;
  }

  function renderNav() {
    ui.questionnaireNav.innerHTML = "";
    state.manifest.forEach((item) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "nav-btn";
      button.dataset.id = item.id;
      button.innerHTML = `<span class="nav-title">${escapeHtml(item.title)}</span><span class="nav-meta">${escapeHtml(item.recommendedAge || "")}</span>`;
      button.addEventListener("click", () => loadQuestionnaire(item.id));
      ui.questionnaireNav.appendChild(button);
    });
    ui.questionnaireNav.querySelectorAll(".nav-btn").forEach((button) => button.classList.toggle("active", button.dataset.id === state.currentId));
  }

  function loadQuestionnaire(id) {
    const questionnaire = state.questionnaires.get(id);
    if (!questionnaire) return;
    state.currentId = id;
    state.currentQuestionnaire = questionnaire;
    renderNav();
    ui.scaleTitle.textContent = questionnaire.title;
    ui.scaleMeta.textContent = [questionnaire.shortTitle || "", questionnaire.recommendedAge ? `권장연령 ${questionnaire.recommendedAge}` : "", questionnaire.questions ? `문항 ${questionnaire.questions.length}개` : ""].filter(Boolean).join(" · ");
    ui.questionPrompt.textContent = questionnaire.questionPrompt || "";
    renderRespondentFields(questionnaire.respondentFields || []);
    renderQuestions(questionnaire.questions || []);
    ui.screeningForm.reset();
    applyFormDefaults();
    clearResult();
    updateProgress();
  }

  function renderRespondentFields(fields) {
    ui.respondentFields.innerHTML = "";
    fields.forEach((field) => ui.respondentFields.appendChild(buildChoiceField(field, `respondent_${field.id}`, false)));
  }

  function renderQuestions(questions) {
    ui.questionsRoot.innerHTML = "";
    let previousSectionTitle = "";
    questions.forEach((question) => {
      if (question.sectionTitle && question.sectionTitle !== previousSectionTitle) {
        ui.questionsRoot.appendChild(buildQuestionSectionHeading(question.sectionTitle));
        previousSectionTitle = question.sectionTitle;
      }
      const section = ui.questionTemplate.content.firstElementChild.cloneNode(true);
      section.dataset.questionId = question.id;
      section.querySelector(".question-number").textContent = question.number || "";
      section.querySelector(".question-text").textContent = question.text || "";
      const choiceGrid = section.querySelector(".choice-grid");
      (question.options || []).forEach((option, index) => choiceGrid.appendChild(buildChoiceCard(question.id, `${question.id}_${index + 1}`, option, true)));
      const subWrap = section.querySelector(".subquestions");
      (question.subQuestions || []).forEach((subQuestion) => subWrap.appendChild(buildChoiceField(subQuestion, subQuestion.id, true)));
      if (!question.subQuestions || !question.subQuestions.length) subWrap.remove();
      ui.questionsRoot.appendChild(section);
    });
  }

  function buildQuestionSectionHeading(title) {
    const heading = document.createElement("div");
    heading.className = "question-section-heading";
    heading.textContent = title;
    return heading;
  }

  function buildChoiceField(field, inputName, isSubQuestion) {
    const node = ui.radioFieldTemplate.content.firstElementChild.cloneNode(true);
    node.dataset.fieldId = field.id;
    node.querySelector(".field-label").textContent = `${field.label || field.text || ""}${field.required ? " *" : ""}`;
    if (isSubQuestion) {
      const number = document.createElement("p");
      number.className = "question-number";
      number.textContent = field.number || "Q.";
      node.prepend(number);
    }
    const choiceGrid = node.querySelector(".choice-grid");
    (field.options || []).forEach((option, index) => choiceGrid.appendChild(buildChoiceCard(inputName, `${inputName}_${index + 1}`, option, !inputName.startsWith("respondent_"))));
    return node;
  }

  function buildChoiceCard(inputName, inputId, option, showScore) {
    const hasScore = option.score !== null && option.score !== undefined && String(option.score).trim() !== "" && !Number.isNaN(Number(option.score));
    const wrapper = document.createElement("label");
    wrapper.className = "choice-card";
    wrapper.setAttribute("for", inputId);
    wrapper.innerHTML = `<input type="radio" name="${escapeHtml(inputName)}" id="${escapeHtml(inputId)}" value="${escapeHtml(String(option.value))}" data-score="${escapeHtml(hasScore ? String(option.score) : "")}" /><span><span class="choice-label-text">${escapeHtml(option.label || "")}</span>${showScore && hasScore ? `<span class="choice-score">점수 ${escapeHtml(String(option.score))}</span>` : ""}</span>`;
    return wrapper;
  }

  function applyFormDefaults() {
    ui.sessionDate.value = todayForInput();
    ui.workerName.value = localStorage.getItem(WORKER_NAME_KEY) || state.status?.currentUser?.displayName || "";
    ui.clientLabel.value = "";
    ui.birthDate.value = "";
    ui.sessionNote.value = "";
  }

  function onFormChange(event) {
    const target = event.target;
    if (!(target instanceof HTMLInputElement) || target.type !== "radio") return;
    syncSelectedState(target.name);
    syncSubQuestionsVisibility();
    updateProgress();
  }

  function syncSelectedState(groupName) {
    document.querySelectorAll(`input[name="${cssEscape(groupName)}"]`).forEach((input) => input.closest(".choice-card")?.classList.remove("is-selected"));
    document.querySelector(`input[name="${cssEscape(groupName)}"]:checked`)?.closest(".choice-card")?.classList.add("is-selected");
  }

  function syncSubQuestionsVisibility() {
    const questionnaire = state.currentQuestionnaire;
    (questionnaire.questions || []).forEach((question) => {
      if (!question.subQuestions || !question.subQuestions.length) return;
      const showSubs = shouldShowSubQuestions(question, questionnaire);
      const subWrap = ui.questionsRoot.querySelector(`[data-question-id="${cssEscape(question.id)}"] .subquestions`);
      if (!subWrap) return;
      subWrap.classList.toggle("hidden", !showSubs);
      if (!showSubs) {
        subWrap.querySelectorAll('input[type="radio"]').forEach((input) => {
          input.checked = false;
          input.closest(".choice-card")?.classList.remove("is-selected");
        });
      }
    });
  }

  function shouldShowSubQuestions(question, questionnaire) {
    if (!question.subQuestions || !question.subQuestions.length) return false;
    if (questionnaire.scoring?.type === "k_mdq" && question.id === "q14") {
      return (questionnaire.scoring.symptomQuestionIds || []).some((id) => {
        const checked = document.querySelector(`input[name="${cssEscape(id)}"]:checked`);
        return Boolean(checked && Number(checked.dataset.score || 0) > 0);
      });
    }
    const checked = document.querySelector(`input[name="${cssEscape(question.id)}"]:checked`);
    return Boolean(checked && Number(checked.dataset.score || 0) > 0);
  }

  function validateResponses(questionnaire) {
    if (!ui.sessionDate.value) return { ok: false, message: "검사일을 입력해주세요.", focusTarget: ui.sessionDate };
    for (const field of questionnaire.respondentFields || []) {
      if (!document.querySelector(`input[name="respondent_${cssEscape(field.id)}"]:checked`)) {
        return { ok: false, message: `응답자 정보의 '${field.label}'을 선택해주세요.` };
      }
    }
    for (const question of questionnaire.questions || []) {
      if (!document.querySelector(`input[name="${cssEscape(question.id)}"]:checked`)) {
        return { ok: false, message: `${question.number} 문항에 답변해주세요.` };
      }
      if (question.subQuestions && question.subQuestions.length && shouldShowSubQuestions(question, questionnaire)) {
        for (const subQuestion of question.subQuestions) {
          if (!document.querySelector(`input[name="${cssEscape(subQuestion.id)}"]:checked`)) {
            return { ok: false, message: `${question.number} 문항의 추가 질문에 답변해주세요.` };
          }
        }
      }
    }
    return { ok: true };
  }

  function collectAnswers(questionnaire) {
    const meta = {
      sessionDate: ui.sessionDate.value,
      workerName: ui.workerName.value.trim(),
      clientLabel: ui.clientLabel.value.trim(),
      birthDate: ui.birthDate.value,
      sessionNote: ui.sessionNote.value.trim()
    };
    const respondent = {};
    (questionnaire.respondentFields || []).forEach((field) => {
      const checked = document.querySelector(`input[name="respondent_${cssEscape(field.id)}"]:checked`);
      respondent[field.id] = checked ? checked.value : null;
    });
    const responses = {};
    (questionnaire.questions || []).forEach((question) => {
      const checked = document.querySelector(`input[name="${cssEscape(question.id)}"]:checked`);
      responses[question.id] = checked ? { value: checked.value, score: Number(checked.dataset.score || 0) } : null;
      (question.subQuestions || []).forEach((subQuestion) => {
        const subChecked = document.querySelector(`input[name="${cssEscape(subQuestion.id)}"]:checked`);
        responses[subQuestion.id] = subChecked ? { value: subChecked.value, score: Number(subChecked.dataset.score || 0) } : null;
      });
    });
    return { meta, respondent, responses };
  }

  function buildProgressSnapshot(questionnaire, payload) {
    const respondent = payload?.respondent || {};
    const responses = payload?.responses || payload?.answers || {};
    const respondentTotal = (questionnaire.respondentFields || []).length;
    const respondentAnswered = (questionnaire.respondentFields || []).filter((field) => respondent[field.id] !== null && respondent[field.id] !== undefined && String(respondent[field.id]).trim() !== "").length;
    let questionTotal = 0;
    let questionAnswered = 0;
    (questionnaire.questions || []).forEach((question) => {
      questionTotal += 1;
      if (responses[question.id]) questionAnswered += 1;
      if (question.subQuestions && question.subQuestions.length && shouldShowSubQuestionsFromResponses(question, questionnaire, responses)) {
        question.subQuestions.forEach((subQuestion) => {
          questionTotal += 1;
          if (responses[subQuestion.id]) questionAnswered += 1;
        });
      }
    });
    const total = respondentTotal + questionTotal;
    const answered = respondentAnswered + questionAnswered;
    return { answered, total, percent: total ? Math.round((answered / total) * 100) : 0 };
  }

  function shouldShowSubQuestionsFromResponses(question, questionnaire, responses) {
    if (!question.subQuestions || !question.subQuestions.length) return false;
    if (questionnaire.scoring?.type === "k_mdq" && question.id === "q14") {
      return (questionnaire.scoring.symptomQuestionIds || []).some((id) => Boolean(responses[id] && Number(responses[id].score || 0) > 0));
    }
    return Boolean(responses[question.id] && Number(responses[question.id].score || 0) > 0);
  }

  function updateProgress() {
    if (!state.currentQuestionnaire) return;
    const progress = buildProgressSnapshot(state.currentQuestionnaire, collectAnswers(state.currentQuestionnaire));
    ui.progressFill.style.width = `${progress.percent}%`;
    ui.progressLabel.textContent = `${progress.percent}%`;
  }

  function onSubmit(event) {
    event.preventDefault();
    const questionnaire = state.currentQuestionnaire;
    const validation = validateResponses(questionnaire);
    if (!validation.ok) return alert(validation.message);
    const payload = collectAnswers(questionnaire);
    const evaluation = evaluateQuestionnaire(questionnaire, payload);
    state.lastResult = {
      id: createLocalId(),
      questionnaireId: questionnaire.id,
      questionnaireTitle: questionnaire.title,
      shortTitle: questionnaire.shortTitle || questionnaire.title,
      createdAt: new Date().toISOString(),
      meta: payload.meta,
      respondent: payload.respondent,
      respondentDisplay: (questionnaire.respondentFields || []).map((field) => ({ label: field.label, value: optionLabel(field.options || [], payload.respondent[field.id]) || "미응답" })),
      answers: payload.responses,
      breakdown: buildBreakdown(questionnaire, payload.responses),
      progress: buildProgressSnapshot(questionnaire, payload),
      evaluation
    };
    renderResult(state.lastResult);
    setStatusMessage("결과 계산을 완료했습니다. 필요하면 바로 구글 시트에 저장할 수 있습니다.", "success");
  }

  function buildBreakdown(questionnaire, responses) {
    return (questionnaire.questions || []).map((question) => {
      const answer = responses[question.id];
      return {
        id: question.id,
        number: question.number,
        text: question.text,
        answerLabel: optionLabel(question.options || [], answer?.value) || "미응답",
        score: answer?.score ?? null,
        subAnswers: (question.subQuestions || []).map((subQuestion) => {
          const subAnswer = responses[subQuestion.id];
          if (!subAnswer) return null;
          return { number: subQuestion.number, text: subQuestion.label || subQuestion.text || "", answerLabel: optionLabel(subQuestion.options || [], subAnswer.value) || "미응답", score: subAnswer.score };
        }).filter(Boolean)
      };
    });
  }

  function evaluateQuestionnaire(questionnaire, payload) {
    if (questionnaire.scoring?.type === "cri") return evaluateCri(questionnaire, payload);
    if (questionnaire.scoring?.type === "k_mdq") return evaluateKmDQ(questionnaire, payload);
    if (questionnaire.scoring?.type === "endorsement_with_distress") return evaluateEndorsement(questionnaire, payload);
    return evaluateSum(questionnaire, payload);
  }

  function evaluateSum(questionnaire, payload) {
    const total = (questionnaire.questions || []).reduce((sum, question) => sum + (payload.responses[question.id]?.score || 0), 0);
    const band = (questionnaire.scoring?.bands || []).find((item) => total >= item.min && total <= item.max) || null;
    const flags = [];
    if (questionnaire.scoring?.suicideFlagQuestionId && (payload.responses[questionnaire.scoring.suicideFlagQuestionId]?.score || 0) > 0) {
      flags.push({ level: "warn", text: "자해·자살사고 관련 문항에 응답이 있어 즉시 추가 확인이 필요합니다." });
    }
    return { title: `${questionnaire.shortTitle || questionnaire.title} 결과`, scoreText: `${total}점`, bandText: band ? band.label : "참고 구간 없음", highlights: [`총점 ${total}점`, ...(band?.description ? [band.description] : []), ...(questionnaire.scoring?.highlights || [])], flags, notes: questionnaire.scoring?.notes || [] };
  }

  function evaluateCri(questionnaire, payload) {
    const responses = payload.responses || {};
    const scoring = questionnaire.scoring || {};
    const groups = scoring.groupQuestionIds || {};
    const groupLabels = scoring.groupLabels || {};
    const grades = scoring.grades || {};
    const groupScore = (ids) => (ids || []).reduce((sum, id) => sum + Number(responses[id]?.score || 0), 0);

    const harmScore = groupScore(groups.harm);
    const mentalScore = groupScore(groups.mental);
    const functionScore = groupScore(groups.function);
    const supportScore = groupScore(groups.support);
    const totalScore = harmScore + mentalScore + functionScore + supportScore;
    const primaryRiskScore = Number(responses[scoring.primaryRiskQuestionId]?.score || 0);
    const psychosisRiskScore = Number(responses[scoring.psychosisRiskQuestionId]?.score || 0);
    const psychosisMentalSum = psychosisRiskScore + mentalScore;

    let gradeKey = "E";
    if (primaryRiskScore === 1) {
      if (harmScore >= 2) {
        gradeKey = psychosisMentalSum >= 1 ? "A" : "B";
      } else {
        gradeKey = psychosisMentalSum >= 1 ? "C" : "D";
      }
    } else if (harmScore >= 1) {
      gradeKey = psychosisMentalSum >= 1 ? "C" : "D";
    } else {
      gradeKey = psychosisMentalSum >= 1 ? "D" : "E";
    }

    const grade = grades[gradeKey] || null;
    const flags = [];
    if (grade?.flagLevel && grade?.flagText) {
      flags.push({ level: grade.flagLevel, text: grade.flagText });
    }

    return {
      title: `${questionnaire.shortTitle || questionnaire.title} 결과`,
      scoreText: `${totalScore}점 / 23점`,
      bandText: grade ? grade.label : "참고 구간 없음",
      highlights: [
        `총점 ${totalScore}점 / 23점`,
        `${groupLabels.harm || "자타해 위험"} ${harmScore}점`,
        `${groupLabels.mental || "정신상태"} ${mentalScore}점`,
        `${groupLabels.function || "기능수준"} ${functionScore}점`,
        `${groupLabels.support || "지지체계"} ${supportScore}점`,
        ...(grade?.description ? [grade.description] : [])
      ],
      flags,
      notes: scoring.notes || []
    };
  }

  function evaluateEndorsement(questionnaire, payload) {
    const yesCount = (questionnaire.questions || []).reduce((count, question) => count + ((payload.responses[question.id]?.score || 0) > 0 ? 1 : 0), 0);
    const distressTotal = (questionnaire.questions || []).reduce((sum, question) => sum + (question.subQuestions || []).reduce((subSum, subQuestion) => subSum + (payload.responses[subQuestion.id]?.score || 0), 0), 0);
    return { title: `${questionnaire.shortTitle || questionnaire.title} 결과`, scoreText: `예 ${yesCount}개 / 힘듦 ${distressTotal}점`, bandText: questionnaire.scoring?.summaryLabel || "참고용 요약", highlights: [`예 응답 수 ${yesCount}개`, `힘듦 보조합계 ${distressTotal}점`], flags: questionnaire.scoring?.referenceWarning ? [{ level: "info", text: questionnaire.scoring.referenceWarning }] : [], notes: questionnaire.scoring?.notes || [] };
  }

  function evaluateKmDQ(questionnaire, payload) {
    const symptomYesCount = (questionnaire.scoring?.symptomQuestionIds || []).reduce((count, id) => count + ((payload.responses[id]?.score || 0) > 0 ? 1 : 0), 0);
    const samePeriodScore = payload.responses[questionnaire.scoring.samePeriodQuestionId]?.score || 0;
    const impairmentScore = payload.responses[questionnaire.scoring.impairmentQuestionId]?.score || 0;
    const positive = symptomYesCount >= (questionnaire.scoring.positiveRule?.symptomYesAtLeast || 7) && samePeriodScore >= (questionnaire.scoring.positiveRule?.samePeriodAtLeast || 1) && impairmentScore >= (questionnaire.scoring.positiveRule?.impairmentAtLeast || 1);
    return { title: `${questionnaire.shortTitle || questionnaire.title} 결과`, scoreText: `예 ${symptomYesCount}개`, bandText: positive ? "양성 참고 기준 충족" : "양성 참고 기준 미충족", highlights: [`증상 문항 예 응답 ${symptomYesCount}개`, `같은 시기 발생 여부 ${samePeriodScore > 0 ? "예" : "아니오"}`], flags: positive ? [{ level: "warn", text: "K-MDQ 참고 양성 기준에 해당해 추가 평가를 권합니다." }] : [], notes: questionnaire.scoring?.notes || [] };
  }

    ui.resultNotes.innerHTML = (record.evaluation.notes || []).map((text) => `<li>${escapeHtml(text)}</li>`).join("");

        applyStatusPayload(response.status || state.status || {});
        setAdminAccountMessage("계정 상태를 변경했습니다.", "success");

      }).deleteScaleWebappAccount(state.sessionToken, username);

  function onAdminRequestsActionClick(event) {

    const action = button.dataset.adminAction;
    const requestId = button.dataset.requestId || "";
    const request = (state.adminData?.requests || []).find((item) => item.requestId === requestId);
    if (!request) return;

    if (action === "prefill-account") {
      fillAdminAccountFormFromRequest(request);
      return;
    }

    if (action === "reject-request") {
      const reviewNote = window.prompt("반려 사유를 입력하세요.", "관리자가 반려했습니다.") || "관리자가 반려했습니다.";
      setAdminAccountMessage("가입 신청을 반려하는 중입니다.", "");
      google.script.run.withSuccessHandler((response) => {
        if (!response?.authenticated) {
          setAdminAccountMessage(response?.loginHint || "세션이 만료되었습니다.", "error");
          return;
        }
        applyStatusPayload(response.status || state.status || {});
        setAdminAccountMessage("가입 신청을 반려했습니다.", "success");
      }).withFailureHandler((error) => {
        setAdminAccountMessage(error?.message || "가입 신청 반려에 실패했습니다.", "error");
      }).rejectScaleSignupRequest(state.sessionToken, requestId, reviewNote);
    }
  }

  function normalizeText(value) {
    return String(value ?? "").trim();
  }

  function onResetForm() {
    ui.screeningForm.reset();
    ui.screeningForm.querySelectorAll(".choice-card").forEach((card) => card.classList.remove("is-selected"));
    applyFormDefaults();
    syncSubQuestionsVisibility();
    updateProgress();
    clearResult();
    setStatusMessage("현재 검사 입력을 초기화했습니다.", "");
  }

  function onSaveResult() {
    if (!state.lastResult) return alert("먼저 결과를 계산해주세요.");
    ui.saveResultBtn.disabled = true;
    setStatusMessage("구글 시트에 저장하는 중입니다.", "");
    google.script.run.withSuccessHandler((response) => {
      if (!response?.authenticated) {
        ui.saveResultBtn.disabled = false;
        clearSessionStorage();
        clearAppStateForLogout();
        showAuthView(response?.loginHint || "세션이 만료되었습니다. 다시 로그인해주세요.", "error");
        return;
      }
      state.lastResult = clone(response.record);
      applyStatusPayload(response.status);
      renderResult(state.lastResult);
      setStatusMessage("구글 시트 저장을 완료했습니다.", "success");
    }).withFailureHandler((error) => {
      ui.saveResultBtn.disabled = false;
      handleFailure(error);
    }).saveScaleRecord(state.sessionToken, clone(state.lastResult));
  }

  function onRefreshApp() {
    setStatusMessage("앱 상태를 다시 불러오는 중입니다.", "");
    google.script.run.withSuccessHandler((response) => {
      applyStatusPayload(response || {});
      setStatusMessage("앱 상태를 새로고침했습니다.", "success");
    }).withFailureHandler(handleFailure).getScaleWebappStatus(state.sessionToken);
  }

  function onRefreshRecords() {
    setStatusMessage("최근 저장 결과를 다시 불러오는 중입니다.", "");
    google.script.run.withSuccessHandler((response) => {
      if (!response?.authenticated) {
        clearSessionStorage();
        clearAppStateForLogout();
        showAuthView(response?.loginHint || "세션이 만료되었습니다. 다시 로그인해주세요.", response?.sessionExpired ? "error" : "");
        return;
      }
      state.recentRecords = Array.isArray(response.records) ? clone(response.records) : [];
      renderRecentRecords();
      setStatusMessage("최근 저장 결과를 새로고침했습니다.", "success");
    }).withFailureHandler(handleFailure).listRecentScaleRecords(state.sessionToken, 20);
  }

  function onLogout() {
    if (!state.sessionToken) {
      clearAppStateForLogout();
      showAuthView(state.publicBootstrap.loginHint || "아이디와 비밀번호를 입력해주세요.", "");
      return;
    }

    ui.logoutBtn.disabled = true;
    setStatusMessage("로그아웃하는 중입니다.", "");
    google.script.run.withSuccessHandler(() => {
      ui.logoutBtn.disabled = false;
      clearSessionStorage();
      clearAppStateForLogout();
      showAuthView("로그아웃했습니다. 다시 로그인해주세요.", "success");
    }).withFailureHandler((error) => {
      ui.logoutBtn.disabled = false;
      clearSessionStorage();
      clearAppStateForLogout();
      showAuthView(error?.message || "로그아웃했습니다. 다시 로그인해주세요.", "error");
    }).logoutScaleWebapp(state.sessionToken);
  }

  function createLocalId() {
    return window.crypto && typeof window.crypto.randomUUID === "function" ? window.crypto.randomUUID() : `id_${Date.now()}_${Math.random().toString(16).slice(2)}`;
  }

  function formatDateTime(iso) {
    const date = new Date(iso);
    if (Number.isNaN(date.getTime())) return iso || "";
    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")} ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
  }

  function todayForInput() {
    const date = new Date();
    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
  }

  function clone(value) { return JSON.parse(JSON.stringify(value)); }
  function optionLabel(options, value) { const found = (options || []).find((option) => String(option.value) === String(value)); return found ? found.label : ""; }
  function escapeHtml(value) { return String(value ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;").replace(/'/g, "&#39;"); }
  function cssEscape(value) { return String(value).replace(/(["\\.#:[\]])/g, "\\$1"); }
})();
</script>
