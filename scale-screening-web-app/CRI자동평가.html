<body class="bg-gray-100 min-h-screen flex items-center justify-center p-2 sm:p-4">
    <div class="w-full max-w-4xl mx-auto bg-white rounded-2xl shadow-lg p-6 md:p-8">
        <header class="text-center mb-6 border-b pb-4">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800">정신건강 위기 평정 척도 (CRI)</h1>
            <p class="text-gray-500 mt-1">항목을 체크하여 위기 수준을 자동으로 평가합니다.</p>
        </header>

        <!-- 기본 정보 입력 -->
        <div class="grid md:grid-cols-3 gap-4 mb-6">
            <div>
                <label for="evaluator" class="block text-sm font-medium text-gray-700">평가자</label>
                <input type="text" id="evaluator" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" placeholder="이름을 입력하세요">
            </div>
            <div>
                <label for="clientName" class="block text-sm font-medium text-gray-700">성명</label>
                <input type="text" id="clientName" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm" placeholder="대상자 성명">
            </div>
            <div>
                <label for="evalDate" class="block text-sm font-medium text-gray-700">실시일</label>
                <input type="date" id="evalDate" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm">
            </div>
        </div>

        <form id="evaluationForm" class="space-y-6">
            <!-- 질문 항목이 여기에 동적으로 추가됩니다 -->
        </form>
        
        <!-- 평가 결과 -->
        <section id="results" class="mt-8 pt-6 border-t printable-section">
            <h2 class="text-xl font-bold text-center mb-4 text-gray-800">평가 결과</h2>
            <div id="result-content" class="bg-gray-50 p-6 rounded-lg shadow-inner">
                <div class="text-center mb-4">
                    <span class="text-lg font-medium text-gray-600">총점</span>
                    <p id="totalScore" class="text-5xl font-extrabold text-indigo-600">0 / 23</p>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-4 mb-4 overflow-hidden">
                    <div id="resultBar" class="h-4 rounded-full bg-gray-400 result-bar-fill" style="width: 0%"></div>
                </div>
                <div id="resultText" class="text-center p-4 rounded-md transition-colors duration-500 bg-gray-100">
                    <p class="font-bold text-xl text-gray-700">평가를 시작해주세요</p>
                    <p class="text-sm text-gray-500 mt-1">항목에 응답하면 결과가 표시됩니다.</p>
                </div>
            </div>
        </section>
        
        <!-- 컨트롤 버튼 -->
        <div class="mt-8 flex flex-col sm:flex-row justify-end gap-3 no-print">
            <button id="resetButton" class="w-full sm:w-auto px-6 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 transition-colors">
                초기화
            </button>
            <button id="jpgButton" class="w-full sm:w-auto px-6 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-colors">
                이미지로 저장 (JPG)
            </button>
            <button id="printButton" class="w-full sm:w-auto px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                PDF 저장 / 인쇄
            </button>
        </div>

        <footer class="text-center text-xs text-gray-400 mt-8 pt-4 border-t">
            <p>※ 결과해석은 절대적 기준이 아니며 평가자의 종합적 판단이 가장 중요합니다.</p>
            <p class="mt-1">척도 개발: 국립정신건강센터, 2020</p>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const criQuestions = [
                { category: '자타해 위험', items: [
                    { q: '현재 자해/타해 폭력위험(기물파손, 욕설, 고함, 등 명백한 폭력 위험)', options: ['있다', '없다'], score: [1, 0] },
                    { q: '최근 1년 내 자살시도', options: ['있다', '없다'], score: [1, 0] },
                    { q: '자타해 폭력 강도 혹은 치명도(경증장애수준 이상 또는 전치2주 이상)', options: ['높다', '낮다'], score: [1, 0] },
                    { q: '고의성 혹은 계획성 수준(자타해 의지, 사전준비, 일정조율, 도구확인 등)', options: ['높다', '낮다'], score: [1, 0] },
                    { q: '최근 1년 내 자타해 위험으로 인한 경찰개입 여부', options: ['있다', '없다'], score: [1, 0] },
                    { q: '최근 일주일내 폭력', options: ['있다', '없다'], score: [1, 0] },
                    { q: '과거 범죄 이력 (폭행, 성폭력, 방화, 타살 등)', options: ['있다', '없다'], score: [1, 0] },
                    { q: '과거 또는 현재 환청(또는 약물, 알코올, 마약 등)에 의한 공격성 여부', options: ['있다', '없다'], score: [1, 0] }
                ]},
                { category: '정신상태', items: [
                    { q: '현재 정신증 증상을 보입니까?', options: ['그렇다', '아니다'], score: [1, 0] },
                    { q: '현재 기분장애 증상을 보입니까?', options: ['그렇다', '아니다'], score: [1, 0] },
                    { q: '현재 조증(경조증) 증상을 보입니까?', options: ['그렇다', '아니다'], score: [1, 0] },
                    { q: '정신과 진단을 받거나 과거 입원한 적이 있습니까?', options: ['있다', '없다'], score: [1, 0] },
                    { q: '알코올/흥분제/환각제/흡입제/대마초/마약 등의 물질관련 문제가 있습니까?', options: ['있다', '없다'], score: [1, 0] },
                    { q: '정신건강문제에 대한 자각 또는 통찰력에 문제가 있습니까?', options: ['있다', '없다'], score: [1, 0] }
                ]},
                { category: '기능수준', items: [
                    { q: '의사소통(언어기능/상호소통)의 손상', options: ['있다', '없다'], score: [1, 0] },
                    { q: '주의나 자각 손상(부주의, 주의산만, 물건을 잘 잃어버림, 잘 넘어지거나 부딪힘, 깜박임 등)', options: ['있다', '없다'], score: [1, 0] },
                    { q: '기억능력 손상(심한 건망증 포함)', options: ['있다', '없다'], score: [1, 0] },
                    { q: '일상적인 의사결정 손상(무엇을 먹을지, 무슨 옷을 입을지, 어떤 생일선물을 사줄지 등)', options: ['있다', '없다'], score: [1, 0] },
                    { q: '인지적 기능의 급격한 변화 여부', options: ['있다', '없다'], score: [1, 0] },
                    { q: '일상 자조능력 상실(약물관리 포함 의식주관련)', options: ['있다', '없다'], score: [1, 0] },
                    { q: '가정/대인관계/업무 적응력 손상', options: ['있다', '없다'], score: [1, 0] }
                ]},
                { category: '지지체계', items: [
                    { q: '실제 도움과 지지를 제공하는 가족, 친구, 기타의 존재가 있습니까?', options: ['있다', '없다'], score: [0, 1] },
                    { q: '현재 도움을 주지는 않으나 제공가능한 가족, 친구, 기타의 존재가 있습니까?', options: ['있다', '없다'], score: [0, 1] }
                ]}
            ];

            const formContainer = document.getElementById('evaluationForm');
            
            criQuestions.forEach((section, sectionIndex) => {
                const details = document.createElement('details');
                details.className = 'bg-white border border-gray-200 rounded-lg overflow-hidden printable-section';
                details.open = true;

                const summary = document.createElement('summary');
                summary.className = 'p-4 bg-gray-50 font-bold text-lg text-gray-700 flex justify-between items-center';
                summary.innerHTML = `<span>${section.category}</span><svg class="w-5 h-5 transition-transform transform" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>`;
                
                const questionList = document.createElement('div');
                questionList.className = 'p-4 md:p-6 space-y-4';
                
                section.items.forEach((item, itemIndex) => {
                    const questionDiv = document.createElement('div');
                    questionDiv.className = 'flex flex-col md:flex-row md:items-center md:justify-between py-2 border-b border-gray-100';
                    const questionP = document.createElement('p');
                    questionP.className = 'text-sm text-gray-800 md:flex-1 mb-2 md:mb-0';
                    questionP.textContent = `${itemIndex + 1}. ${item.q}`;
                    const optionsDiv = document.createElement('div');
                    optionsDiv.className = 'flex items-center space-x-4';
                    
                    item.options.forEach((option, optionIndex) => {
                        const label = document.createElement('label');
                        label.className = 'flex items-center space-x-2 text-sm cursor-pointer';
                        const radio = document.createElement('input');
                        radio.type = 'radio';
                        radio.name = `q-${sectionIndex}-${itemIndex}`;
                        radio.value = item.score[optionIndex];
                        radio.className = 'h-4 w-4 text-indigo-600 border-gray-300 focus:ring-indigo-500';
                        radio.addEventListener('change', evaluateCRI);
                        const span = document.createElement('span');
                        span.textContent = option;
                        label.appendChild(radio);
                        label.appendChild(span);
                        optionsDiv.appendChild(label);
                    });
                    
                    questionDiv.appendChild(questionP);
                    questionDiv.appendChild(optionsDiv);
                    questionList.appendChild(questionDiv);
                });
                
                details.appendChild(summary);
                details.appendChild(questionList);
                formContainer.appendChild(details);

                details.addEventListener('toggle', () => {
                    const icon = summary.querySelector('svg');
                    icon.style.transform = details.open ? 'rotate(0deg)' : 'rotate(-180deg)';
                });
            });

            function evaluateCRI() {
                let subScores = { harmScore: 0, mentalScore: 0, functionScore: 0, supportScore: 0, q1Score: 0, q8Score: 0 };
                const radios = document.querySelectorAll('input[type="radio"]:checked');
                
                radios.forEach(radio => {
                    const nameParts = radio.name.split('-');
                    const sectionIndex = parseInt(nameParts[1]);
                    const itemIndex = parseInt(nameParts[2]);
                    const score = parseInt(radio.value);

                    if (sectionIndex === 0) {
                        subScores.harmScore += score;
                        if (itemIndex === 0) subScores.q1Score = score;
                        if (itemIndex === 7) subScores.q8Score = score;
                    } else if (sectionIndex === 1) {
                        subScores.mentalScore += score;
                    } else if (sectionIndex === 2) {
                        subScores.functionScore += score;
                    } else if (sectionIndex === 3) {
                        subScores.supportScore += score;
                    }
                });

                const totalScore = subScores.harmScore + subScores.mentalScore + subScores.functionScore + subScores.supportScore;
                let level, description, barColor, textColor, bgColor, finalGrade;
                const q8AndMentalSum = subScores.q8Score + subScores.mentalScore;
                
                if (subScores.q1Score === 1) {
                    if (subScores.harmScore >= 2) {
                        finalGrade = (q8AndMentalSum >= 1) ? 'A' : 'B';
                    } else {
                        finalGrade = (q8AndMentalSum >= 1) ? 'C' : 'D';
                    }
                } else {
                    if (subScores.harmScore >= 1) {
                        finalGrade = (q8AndMentalSum >= 1) ? 'C' : 'D';
                    } else {
                        finalGrade = (q8AndMentalSum >= 1) ? 'D' : 'E';
                    }
                }

                switch (finalGrade) {
                    case 'A':
                        level = 'A등급 (극도의 위기)';
                        description = '정신건강전문요원, 경찰, 119구급대원 공조하여 정신과 응급입원 필요';
                        barColor = 'bg-red-600'; bgColor = 'bg-red-100'; textColor = 'text-red-800';
                        break;
                    case 'B':
                        level = 'B등급 (위기)';
                        description = '현재 또는 과거 자살/자해 경험이 있는 경우 정신과 외래치료 및 전문가 연계 필요(단, 단순 폭력상황이라고 판단되는 경우 경찰에 인계)';
                        barColor = 'bg-orange-500'; bgColor = 'bg-orange-100'; textColor = 'text-orange-800';
                        break;
                    case 'C':
                        level = 'C등급 (고위험)';
                        description = '현재 자해위험은 있거나 과거(최근) 자해 이력이 있고 정신과적 증상이 관찰되는 경우로 고위험군에 해당, 정신상태, 기능수준, 지지체계 결과를 고려하여 집중관리 필요';
                        barColor = 'bg-yellow-500'; bgColor = 'bg-yellow-100'; textColor = 'text-yellow-800';
                        break;
                    case 'D':
                        level = 'D등급 (주의)';
                        description = '과거 자해위험은 있으나 현재 뚜렷한 정신과적 증상이 없는 경우, 또는 과거 자해위험은 없으나 현재 의심되는 정신과적 문제나 증상이 관찰되는 경우로 주의관찰 필요';
                        barColor = 'bg-green-500'; bgColor = 'bg-green-100'; textColor = 'text-green-800';
                        break;
                    case 'E':
                        level = 'E등급 (위기 상황 아님)';
                        description = '위기상황 아님';
                        barColor = 'bg-blue-500'; bgColor = 'bg-blue-100'; textColor = 'text-blue-800';
                        break;
                }
                
                updateResultUI(totalScore, level, description, barColor, bgColor, textColor);
            }

            function updateResultUI(score, level, description, barColor, bgColor, textColor) {
                document.getElementById('totalScore').textContent = `${score} / 23`;
                const resultBar = document.getElementById('resultBar');
                const percentage = (score / 23) * 100;
                resultBar.style.width = `${percentage}%`;
                resultBar.className = `h-4 rounded-full result-bar-fill ${barColor}`;
                const resultText = document.getElementById('resultText');
                resultText.className = `text-center p-4 rounded-md transition-colors duration-500 ${bgColor}`;
                resultText.innerHTML = `
                    <p class="font-bold text-xl ${textColor}">${level}</p>
                    <p class="text-sm mt-1 ${textColor}">${description}</p>
                `;
            }

            document.getElementById('resetButton').addEventListener('click', () => {
                document.getElementById('evaluationForm').reset();
                document.getElementById('clientName').value = '';
                document.getElementById('evaluator').value = '';
                document.getElementById('evalDate').valueAsDate = new Date();
                const resultText = document.getElementById('resultText');
                resultText.className = 'text-center p-4 rounded-md transition-colors duration-500 bg-gray-100';
                resultText.innerHTML = `<p class="font-bold text-xl text-gray-700">평가를 시작해주세요</p><p class="text-sm text-gray-500 mt-1">항목에 응답하면 결과가 표시됩니다.</p>`;
                document.getElementById('totalScore').textContent = '0 / 23';
                const resultBar = document.getElementById('resultBar');
                resultBar.style.width = '0%';
                resultBar.className = 'h-4 rounded-full bg-gray-400 result-bar-fill';
            });
            
            document.getElementById('jpgButton').addEventListener('click', () => {
                const resultElement = document.getElementById('result-content');
                html2canvas(resultElement, { scale: 2 }).then(canvas => {
                    const image = canvas.toDataURL("image/jpeg", 0.9);
                    const link = document.createElement('a');
                    let clientName = document.getElementById('clientName').value || '대상자';
                    let evalDate = document.getElementById('evalDate').value || new Date().toISOString().slice(0,10);
                    link.download = `CRI평가결과_${clientName}_${evalDate}.jpg`;
                    link.href = image;
                    link.click();
                });
            });

            document.getElementById('printButton').addEventListener('click', () => {
                window.print();
            });

            document.getElementById('evalDate').valueAsDate = new Date();
        });
    </script>
</body>
</html>
